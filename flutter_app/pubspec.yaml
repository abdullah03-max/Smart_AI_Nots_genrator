name: ai_smart_notes
description: AI-powered smart notes app with quiz generation and summarization.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.3.4

  # State Management
  provider: ^6.1.1

  # HTTP & API
  http: ^1.2.0

  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # File Handling
  file_picker: ^8.0.0
  image_picker: ^1.0.7
  path_provider: ^2.1.2

  # UI Components
  flutter_staggered_animations: ^1.1.1
  shimmer: ^3.0.0
  lottie: ^3.1.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  animated_text_kit: ^4.2.2

  # Rich Text Editor
  flutter_quill: ^11.5.0

  # Charts/Stats
  fl_chart: ^0.68.0

  # Utilities
  intl: ^0.20.2
  uuid: ^4.3.3
  url_launcher: ^6.2.6
  connectivity_plus: ^6.0.3
  package_info_plus: ^8.0.0

  # Icons
  cupertino_icons: ^1.0.6

  # Dialogs & Overlays
  awesome_dialog: ^3.2.0
  fluttertoast: ^8.2.4

  # PDF
  flutter_pdfview: ^1.3.2
  pdf: ^3.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.jpg"
